name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
            cc: gcc
          - os: ubuntu-latest
            cxx: clang++
            cc: clang
          - os: macos-latest
            cxx: clang++
            cc: clang
        # MSVC is intentionally not in the matrix yet: the simulation
        # core uses __int128 for overflow-safe Q32.32 multiply/divide,
        # and an MSVC port using the _mul128/_div128 intrinsics is a
        # documented follow-up. Add Windows back here once that lands.
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CXX: ${{ matrix.cxx }}
          CC:  ${{ matrix.cc }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Unit tests
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure -LE soak

      - name: Soak smoke (60s)
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure -L soak --timeout 180

      # Determinism cross-check: re-validate the committed
      # samples/sample.iclr (recorded on Linux/GCC) by re-simulating
      # it on whatever compiler this matrix cell is using. If
      # __int128 / serialization / RNG differ across toolchains the
      # recorded hash chain will not match and this step will fail.
      - name: Cross-platform replay determinism
        shell: bash
        run: |
          ./build/apps/arena_demo/arena_demo --replay-info samples/sample.iclr \
              | tee /tmp/info.txt
          grep -q "hash chain        : OK" /tmp/info.txt

  asan:
    name: ubuntu / gcc / asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DIRONCLAD_SANITIZE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Tests under sanitizers
        run: ctest --test-dir build --output-on-failure -LE soak

  # Generate a fresh sample replay + studio screenshots and upload
  # them as workflow artifacts. Lets reviewers (and the README) link
  # to the latest visualization without committing binaries.
  artifacts:
    name: replay sample + screenshots
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev imagemagick
      - name: Configure
        run: cmake -S . -B build -DIRONCLAD_BUILD_SDL_DEMO=ON -DIRONCLAD_USE_IMGUI=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Generate sample.iclr
        run: ./scripts/make-sample.sh
      - name: Studio screenshots (offscreen SDL)
        env:
          SDL_VIDEODRIVER: offscreen
        run: |
          mkdir -p artifacts
          for FRAME in 50 200 900 1500; do
            ./build/apps/arena_view/arena_view \
              --replay samples/sample.iclr \
              --screenshot artifacts/studio_frame_${FRAME}.bmp \
              --frame ${FRAME}
            convert artifacts/studio_frame_${FRAME}.bmp \
                    artifacts/studio_frame_${FRAME}.png
            rm artifacts/studio_frame_${FRAME}.bmp
          done
      - name: Replay info text
        run: |
          ./build/apps/arena_demo/arena_demo --replay-info samples/sample.iclr \
              | tee artifacts/sample.info.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ironclad-replay-studio
          path: |
            samples/sample.iclr
            artifacts/*

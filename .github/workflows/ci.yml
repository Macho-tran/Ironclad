name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
            cc: gcc
          - os: ubuntu-latest
            cxx: clang++
            cc: clang
          - os: macos-latest
            cxx: clang++
            cc: clang
        # MSVC is intentionally not in the matrix yet: the simulation
        # core uses __int128 for overflow-safe Q32.32 multiply/divide,
        # and an MSVC port using the _mul128/_div128 intrinsics is a
        # documented follow-up. Add Windows back here once that lands.
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CXX: ${{ matrix.cxx }}
          CC:  ${{ matrix.cc }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Unit tests
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure -LE soak

      - name: Soak smoke (60s)
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure -L soak --timeout 180

  asan:
    name: ubuntu / gcc / asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DIRONCLAD_SANITIZE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Tests under sanitizers
        run: ctest --test-dir build --output-on-failure -LE soak
